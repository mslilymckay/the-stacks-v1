<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CSV Import Utility</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
    }
    #status {
      margin-top: 20px;
      font-family: monospace;
      white-space: pre-wrap;
      background: #f4f4f4;
      padding: 15px;
      border-radius: 4px;
      max-height: 400px;
      overflow-y: auto;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body>
  <h1>CSV Book Import Utility</h1>
  <p>Select your .csv reading list file to upload to the database.</p>
  
  <input type="file" id="fileInput" accept=".csv">
  <button id="uploadBtn">Process Upload</button>
  
  <div id="status"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    const supabaseUrl = 'https://jvsjzlvabtffhsnvmcto.supabase.co';
    const supabaseKey = 'sb_publishable_H2EPwvAaziQVz8T4yExdEw_bQrB5f3V';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const fileInput = document.getElementById('fileInput');
    const uploadBtn = document.getElementById('uploadBtn');
    const statusDiv = document.getElementById('status');

    uploadBtn.addEventListener('click', () => {
      const file = fileInput.files[0];
      
      if (!file) {
        statusDiv.textContent = 'Please select a CSV file first.\n';
        return;
      }

      statusDiv.textContent = 'Parsing CSV...\n';

      Papa.parse(file, {
        header: true,
        skipEmptyLines: true,
        complete: async function(results) {
          const rows = results.data;
          statusDiv.textContent += `Found ${rows.length} books. Starting upload...\n\n`;
          
          let successCount = 0;
          let errorCount = 0;

          for (const row of rows) {
            try {
              // Map the CSV headers to the Supabase schema
              // Notice we omit 'uuid' so Supabase generates a new one automatically
              const bookEntry = {
                title: row['Title'] || 'Unknown Title',
                author: row['Author'] || 'Unknown Author',
                category: row['Category (Genre)'] || 'Uncategorized',
                isbn: row['ISBN'] || null,
                read_date: row['Read Date'] ? new Date(row['Read Date']).toISOString() : null,
                cover_url: row['Cover URL'] || null,
                
                // Hardcoded values for this specific import
                user_id: '1de755f3-fcc6-4a3e-ae3f-f233089cd024',
                date_added: new Date().toISOString(),
                status: 2 // Finished
              };

              const { error } = await supabase.from('books-multi').insert([bookEntry]);
              
              if (error) throw error;
              
              successCount++;
              statusDiv.textContent += `✓ Uploaded: ${bookEntry.title}\n`;
              
            } catch (err) {
              errorCount++;
              statusDiv.textContent += `✕ Error uploading ${row['Title']}: ${err.message}\n`;
            }
            
            statusDiv.scrollTop = statusDiv.scrollHeight;
          }
          
          statusDiv.textContent += `\nImport complete! Successfully added ${successCount} books.`;
          if (errorCount > 0) {
            statusDiv.textContent += ` Encountered ${errorCount} errors.`;
          }
        },
        error: function(err) {
          statusDiv.textContent += `✕ CSV Parsing Error: ${err.message}\n`;
        }
      });
    });
  </script>
</body>
</html>
